<div class="video-box video-right">
    <video id="player-right" autoplay loop muted playsinline>

    </video>
    <div id="text-right" class="video-text"></div>
</div>

<script>
    // --- PLAYLIST CONFIGURATA ---
    const playlist = [
        { url: "https://i.imgur.com/U08g0br.mp4", label: "🎀𝒞𝒽𝓇𝒾𝓈𝓉𝒾𝓃𝒶🎀" },
        { url: "https://i.imgur.com/4GKuW8H.mp4", label: "🎀𝒞𝒽𝓇𝒾𝓈𝓉𝒾𝓃𝒶🎀" },
        { url: "https://i.imgur.com/Ik8d94F.mp4", label: "🎀𝒞𝒽𝓇𝒾𝓈𝓉𝒾𝓃𝒶🎀" },
        { url: "https://i.imgur.com/6FBqTsn.mp4", label: "🎀𝒞𝒽𝓇𝒾𝓈𝓉𝒾𝓃𝒶🎀" }
    ];

    function updateVideos() {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes();

        // Calcola lo slot di 10 minuti (esempio: dalle 14:00 alle 14:29 è uno slot)
        const currentSlot = (hours * 2) + (minutes >= 10 ? 1 : 0);
        
        // Seleziona i video basandosi sullo slot temporale
        // Sinistra: video corrente della lista
        // Destra: video successivo della lista
        const leftIndex = currentSlot % playlist.length;
        const rightIndex = (currentSlot + 1) % playlist.length;

        const leftVideo = playlist[leftIndex];
        const rightVideo = playlist[rightIndex];

        // Aggiorna Sinistra se il link è cambiato
        const vLeft = document.getElementById('player-left');
        const sLeft = document.getElementById('source-left');
        if (sLeft.src !== leftVideo.url) {
            sLeft.src = leftVideo.url;
            document.getElementById('text-left').innerText = leftVideo.label;
            vLeft.load();
            vLeft.play();
        }

        // Aggiorna Destra se il link è cambiato
        const vRight = document.getElementById('player-right');
        const sRight = document.getElementById('source-right');
        if (sRight.src !== rightVideo.url) {
            sRight.src = rightVideo.url;
            document.getElementById('text-right').innerText = rightVideo.label;
            vRight.load();
            vRight.play();
        }
    }

    // Controlla ogni 30 secondi se è scattata la mezz'ora
    setInterval(updateVideos, 30000);
    
    // Avvia subito
    updateVideos();
</script>
